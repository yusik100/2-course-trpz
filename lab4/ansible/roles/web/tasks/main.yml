---
- name: Install Nginx, Node.js, npm, git
  ansible.builtin.apt:
    name:
      - nginx
      - nodejs
      - npm
      - git
    state: present
    update_cache: yes

- name: Create app user
  ansible.builtin.user:
    name: app
    system: yes
    shell: /bin/false

- name: Create operator user
  ansible.builtin.user:
    name: operator
    password: "{{ '12345678' | password_hash('sha512') }}"
    shell: /bin/bash

- name: Setup sudoers for operator
  ansible.builtin.copy:
    dest: /etc/sudoers.d/operator
    content: "operator ALL=(ALL) NOPASSWD: /bin/systemctl start mywebapp, /bin/systemctl stop mywebapp, /bin/systemctl restart mywebapp, /bin/systemctl status mywebapp, /bin/systemctl reload nginx"
    mode: '0440'

- name: Clone app repository
  ansible.builtin.git:
    repo: 'https://github.com/yusik100/2-course-trpz.git'
    dest: /opt/trpz-labs
    version: main
    force: yes

- name: Copy app to running directory
  ansible.builtin.copy:
    src: /opt/trpz-labs/lab1/mywebapp/
    dest: /opt/mywebapp/
    owner: app
    group: app
    remote_src: yes

- name: Install npm dependencies
  community.general.npm:
    path: /opt/mywebapp

- name: Deploy mywebapp systemd service template
  ansible.builtin.template:
    src: mywebapp.service.j2
    dest: /etc/systemd/system/mywebapp.service
  notify: restart mywebapp

- name: Deploy Nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/mywebapp
  notify: restart nginx

- name: Enable Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/mywebapp
    dest: /etc/nginx/sites-enabled/mywebapp
    state: link

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Ensure services are started
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: yes
    daemon_reload: yes
  loop:
    - mywebapp
    - nginx