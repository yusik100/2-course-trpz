---
- name: Створити системного користувача app
  user:
    name: app
    system: yes
    shell: /usr/sbin/nologin

- name: Створити користувача operator
  user:
    name: operator
    shell: /bin/bash
    password: "{{ '12345678' | password_hash('sha512') }}"

- name: Налаштувати обмежені права sudo для operator
  copy:
    content: |
      operator ALL=(ALL) NOPASSWD: /bin/systemctl start webapp, /bin/systemctl stop webapp, /bin/systemctl restart webapp, /bin/systemctl status webapp, /bin/systemctl reload nginx
    dest: /etc/sudoers.d/operator
    mode: '0440'

- name: Встановити Nginx та Flask
  apt:
    name:
      - nginx
      - python3-flask
      - python3-pymysql
    state: present

- name: Застосувати шаблон Nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: Reload Nginx

- name: Завантажити код застосунку
  copy:
    dest: /opt/webapp.py
    owner: app
    mode: '0644'
    content: |
      import argparse, pymysql
      from flask import Flask, request, jsonify

      parser = argparse.ArgumentParser()
      parser.add_argument('--db-host', required=True)
      parser.add_argument('--db-user', required=True)
      parser.add_argument('--db-pass', required=True)
      parser.add_argument('--db-name', required=True)
      parser.add_argument('--port', type=int, default=8000)
      args = parser.parse_args()

      app = Flask(__name__)

      def get_db():
          return pymysql.connect(host=args.db_host, user=args.db_user, password=args.db_pass, database=args.db_name, cursorclass=pymysql.cursors.DictCursor)

      @app.route('/health/alive')
      def alive(): return jsonify(status="alive"), 200

      @app.route('/health/ready')
      def ready():
          try:
              get_db().ping()
              return jsonify(status="ready", db="connected"), 200
          except Exception as e:
              return jsonify(status="error", details=str(e)), 500

      @app.route('/items', methods=['GET', 'POST'])
      def items():
          db = get_db()
          with db.cursor() as c:
              if request.method == 'POST':
                  data = request.json
                  c.execute("INSERT INTO inventory (name, quantity) VALUES (%s, %s)", (data['name'], data['quantity']))
                  db.commit()
                  return jsonify(status="created"), 201
              else:
                  c.execute("SELECT id, name FROM inventory")
                  return jsonify(c.fetchall())

      @app.route('/items/<int:id>', methods=['GET'])
      def item(id):
          with get_db().cursor() as c:
              c.execute("SELECT id, name, quantity, created_at FROM inventory WHERE id=%s", (id,))
              res = c.fetchone()
          return jsonify(res) if res else (jsonify(error="not found"), 404)

      if __name__ == '__main__':
          app.run(host='127.0.0.1', port=args.port)

- name: Створити SystemD сервіс для застосунку
  copy:
    content: |
      [Unit]
      Description=Simple Inventory Web App
      After=network.target
      [Service]
      User=app
      ExecStart=/usr/bin/python3 /opt/webapp.py --db-host {{ hostvars['db-node']['ansible_host'] }} --db-user mywebapp_user --db-pass supersecretpassword --db-name mywebapp_db --port {{ app_port }}
      Restart=always
      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/webapp.service
  notify: Restart WebApp