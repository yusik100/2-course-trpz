---
- name: Install MariaDB and Python PyMySQL
  ansible.builtin.apt:
    name: 
      - mariadb-server
      - python3-pymysql
    state: present
    update_cache: yes

- name: Ensure MariaDB is running
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes

- name: Configure MariaDB to listen on all interfaces
  ansible.builtin.lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^bind-address'
    line: 'bind-address = 0.0.0.0'
  notify: restart mariadb

- name: Create inventory database
  community.mysql.mysql_db:
    name: inventory
    state: present

- name: Create app_user and grant privileges
  community.mysql.mysql_user:
    name: app_user
    password: app_password
    priv: 'inventory.*:ALL'
    host: "{{ hostvars[groups['workers'][0]]['ansible_default_ipv4']['address'] }}"
    state: present