#cloud-config
package_update: true
packages:
  - virtualbox-guest-utils
  - net-tools

network:
  version: 2
  ethernets:
    enp0s8:
      dhcp4: true

users:
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${file("~/.ssh/id_ed25519.pub")}

chpasswd:
  list: |
    ansible:12345678
  expire: False

ssh_pwauth: true
