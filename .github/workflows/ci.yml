name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ '*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Аналіз shell-скриптів (Shellcheck)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './lab1'

      - name: Аналіз Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./lab1/mywebapp/Dockerfile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Встановлення залежностей
        working-directory: ./lab1/mywebapp
        run: npm install

      - name: Аналіз коду (ESLint)
        working-directory: ./lab1/mywebapp
        run: npx eslint .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Встановлення залежностей
        working-directory: ./lab1/mywebapp
        run: npm install

      - name: Запуск тестів з покриттям
        working-directory: ./lab1/mywebapp
        run: npm test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./lab1/mywebapp/coverage/

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Авторизація в GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Формування тегів для образу
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mywebapp
          tags: |
            # Для комітів у гілку main:
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,enable={{is_default_branch}}
            # Для релізних тегів (наприклад, v1.0.0):
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Збірка та пуш Docker-образу
        uses: docker/build-push-action@v5
        with:
          context: ./lab1/mywebapp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}