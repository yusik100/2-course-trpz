server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://web:8000/;
        proxy_set_header Host $host;
    }
    
    location /items {
        proxy_pass http://web:8000/items;
        proxy_set_header Host $host;
    }

    location /health {
        deny all;
    }
}