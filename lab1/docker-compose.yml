version: "3.8"

services:
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: inventory
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    restart: unless-stopped

  web:
    build: ./mywebapp
    command: >
      sh -c "sleep 15 && 
             node migrate.js --dbhost=db --dbuser=app_user --dbpass=app_password --dbname=inventory && 
             sed -i 's/127.0.0.1/0.0.0.0/g' mywebapp.js && 
             node mywebapp.js --port=8000 --dbhost=db --dbuser=app_user --dbpass=app_password --dbname=inventory"
    depends_on:
      - db
    networks:
      - app_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
